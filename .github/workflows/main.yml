name: 更新域名列表

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0 点（北京时间 8 点）自动运行
  workflow_dispatch:     # 允许手动触发
  push:
    paths:
      - 'config/**'      # 配置文件变更时触发
      - 'scripts/**'     # 脚本文件变更时触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # 授予写入仓库的权限
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # 仅拉取最新提交，提升执行速度

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'    # 缓存 pip 依赖，加速依赖安装

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: 创建必要目录和默认 DNS 文件
        run: |
          # 创建核心目录
          mkdir -p config dist

          # 生成国内 DNS 服务器文件（DoH 格式，适配 AdGuard Home）
          if [ ! -f config/cn_dns.txt ]; then
            cat > config/cn_dns.txt <<EOF
https://doh.pub/dns-query
https://dns.alidns.com/dns-query
EOF
          fi

          # 生成国外 DNS 服务器文件（DoH 格式，适配 AdGuard Home）
          if [ ! -f config/foreign_dns.txt ]; then
            cat > config/foreign_dns.txt <<EOF
https://1.1.1.1/dns-query
https://8.8.8.8/dns-query
EOF
          fi

          # 创建自定义域名文件（空文件兜底）
          touch config/custom_cn_domains.txt
          touch config/custom_foreign_domains.txt

      - name: 验证 DNS 文件格式（确保 AdGuard Home 可识别）
        run: |
          # 校验国内 DNS 文件
          if [ ! -s config/cn_dns.txt ]; then
            echo "错误：config/cn_dns.txt 文件为空或不存在"
            exit 1
          fi
          # 检查每行是否为合法的 DoH 地址（以 https:// 开头）
          if ! grep -E "^https://" config/cn_dns.txt > /dev/null; then
            echo "错误：config/cn_dns.txt 包含非 DoH 格式的地址，AdGuard Home 无法识别"
            cat config/cn_dns.txt
            exit 1
          fi

          # 校验国外 DNS 文件
          if [ ! -s config/foreign_dns.txt ]; then
            echo "错误：config/foreign_dns.txt 文件为空或不存在"
            exit 1
          fi
          if ! grep -E "^https://" config/foreign_dns.txt > /dev/null; then
            echo "错误：config/foreign_dns.txt 包含非 DoH 格式的地址，AdGuard Home 无法识别"
            cat config/foreign_dns.txt
            exit 1
          fi

      - name: 生成域名配置文件
        run: |
          python scripts/generate_config.py

      - name: 转换为 QuanX 格式
        run: |
          python scripts/domain_to_quanx.py

      - name: 提交更新到仓库
        run: |
          # 配置 Git 提交身份
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 暂存 dist 目录下的所有变更
          git add dist/*
          
          # 仅当有实际变更时提交，避免空提交
          if ! git diff --quiet && ! git diff --staged --quiet; then
            git commit -m "自动更新域名列表 $(date +'%Y-%m-%d %H:%M:%S')"
          else
            echo "无变更，跳过提交步骤"
          fi

      - name: 推送更新到分支
        uses: ad-m/github-push-action@v0.6.0  # 锁定版本，避免兼容性问题
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}      # 推送至当前触发分支
          force: false                        # 禁止强制推送，保护分支安全
